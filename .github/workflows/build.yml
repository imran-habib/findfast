name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pystray keyboard Pillow

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name QuickFind --icon=quickfind.ico --add-data "quickfind.ico;." findfast.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfind-windows
          path: dist/QuickFind.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name quickfind findfast.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfind-linux
          path: dist/quickfind

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: quickfind-windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: quickfind-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QuickFind.exe
            quickfind
