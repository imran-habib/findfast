name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pystray keyboard Pillow

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name QuickFind --icon=quickfind.ico --add-data "quickfind.ico;." quickfind.py

      - name: Build Installer
        run: |
          choco install innosetup -y --no-progress
          $env:TAG_VERSION = "${{ github.ref_name }}".TrimStart("v")
          iscc /DTAG_VERSION="$env:TAG_VERSION" installer.iss

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: quickfind-windows-portable
          path: dist/QuickFind.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: quickfind-windows-installer
          path: installer/QuickFind-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name quickfind-linux quickfind.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfind-linux
          path: dist/quickfind-linux

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: quickfind-windows-portable

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: quickfind-windows-installer

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: quickfind-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QuickFind.exe
            QuickFind-Setup.exe
            quickfind-linux
